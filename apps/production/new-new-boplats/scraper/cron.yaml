apiVersion: batch/v1
kind: CronJob
metadata:
  name: new-new-boplats-scraper
spec:
  schedule: "1 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: new-new-boplats-scraoer
              image: artifactory.local.hejsan.xyz/docker/josmase/new-new-boplats-scraper:v0.0.20@sha256:1163136e6d6bb40c5a608bd56378b86ba6d59ed1cfabdd7f96a7b2b6242e49a2
              env:
                - name: "DB_URI"
                  valueFrom:
                    secretKeyRef:
                      name: new-new-boplats-database-new-new-boplats-new-new-boplats-scraper-user
                      key: connectionString.standardSrv
              resources:
                limits:
                  memory: 512Mi
                  cpu: "1"
                requests:
                  memory: 256Mi
                  cpu: "0.2"
          restartPolicy: Never
