---
apiVersion: v1
kind: ConfigMap
metadata:
  name: boplats-db-claim
  namespace: new-new-boplats
data:
  database: new_new_boplats
  users: |
    - name: boplats-api-user
      role: read
      secret: boplats-api-connection
    - name: boplats-scraper-user
      role: readWrite
      secret: boplats-scraper-connection
---
apiVersion: batch/v1
kind: Job
metadata:
  name: boplats-db-init
  namespace: new-new-boplats
  annotations:
    helm.sh/hook: post-install
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: db-provisioner

      containers:
        - name: provision
          image: artifactory.local.hejsan.xyz/gitlab-registry/josmase/infrastructure/db-provisioner:2026-06-17-511cb6cd
          env:
            - name: PG_HOST
              value: shared-postgres-rw.cnpg-system.svc
            - name: DB_CLAIM_CONFIGMAP
              value: boplats-db-claim
          volumeMounts:
            - name: superuser-password
              mountPath: /etc/superuser-password
              readOnly: true
          resources:
            limits:
              memory: 128Mi
              cpu: 200m
            requests:
              memory: 64Mi
              cpu: 100m
      volumes:
        - name: superuser-password
          secret:
            secretName: shared-postgres-superuser
            defaultMode: 0400
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: db-provisioner
  namespace: new-new-boplats
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: db-provisioner
  namespace: new-new-boplats
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: db-provisioner-ns
subjects:
  - kind: ServiceAccount
    name: db-provisioner
    namespace: new-new-boplats
