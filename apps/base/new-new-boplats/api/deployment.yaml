---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: new-new-boplats-api
spec:
  replicas: 3
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: new-new-boplats-api
  template:
    spec:
      initContainers:
        - name: drizzle-migrate
          image: artifactory.local.hejsan.xyz/gitlab-registry/josmase/apps/boplats-map/api:2026-06-11-d0ba82c
          env:
            - name: "DB_URI"
              valueFrom:
                secretKeyRef:
                  name: boplats-api-connection
                  key: uri
          command:
            - sh
            - -c
            - |
              cat > /tmp/migrate.mjs << 'SCRIPT'
              import postgres from "postgres";
              import { drizzle } from "drizzle-orm/postgres-js";
              import { migrate } from "drizzle-orm/postgres-js/migrator";
              const uri = process.env.DB_URI;
              if (!uri) { console.error("DB_URI required"); process.exit(1); }
              console.log("Connecting...");
              const client = postgres(uri, { prepare: false });
              const db = drizzle(client);
              console.log("Running migrations...");
              try {
                await migrate(db, { migrationsFolder: "/app/libs/database/drizzle" });
                console.log("Migrations complete!");
              } catch (err) {
                console.error("Migration failed:", err);
                process.exit(1);
              } finally {
                await client.end();
              }
              SCRIPT
              node /tmp/migrate.mjs
      containers:
        - name: new-new-boplats-api
          image: artifactory.local.hejsan.xyz/gitlab-registry/josmase/apps/boplats-map/api:2026-06-11-d0ba82c
          env:
            - name: "DB_URI"
              valueFrom:
                secretKeyRef:
                  name: boplats-api-connection
                  key: uri
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
            requests:
              memory: 256Mi
              cpu: "0.2"
