---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: new-new-boplats-web
spec:
  replicas: 3
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: new-new-boplats-web
  template:
    spec:
      containers:
        - name: new-new-boplats-web
          image: registry.local.hejsan.xyz/josmase/apps/boplats-map/web:PLACEHOLDER
          env:
            - name: API_URL
              value: /api
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
            requests:
              memory: 256Mi
              cpu: "0.2"
