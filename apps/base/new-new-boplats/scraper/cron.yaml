apiVersion: batch/v1
kind: CronJob
metadata:
  name: new-new-boplats-scraper
spec:
  schedule: "0 8 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: new-new-boplats-scraper
              image: artifactory.local.hejsan.xyz/gitlab-registry/josmase/apps/boplats-map/scraper:2026-06-10-8b523045
              env:
                - name: "DB_URI"
                  valueFrom:
                    secretKeyRef:
                      name: boplats-scraper-connection
                      key: uri
              resources:
                limits:
                  memory: 512Mi
                  cpu: "1"
                requests:
                  memory: 256Mi
                  cpu: "0.2"
          restartPolicy: Never
