apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resume
  template:
    spec:
      imagePullSecrets:
        - name: gitlab-registry-pull
      containers:
        - name: resume
          image: registry.local.hejsan.xyz/josmase/personal/resume:2026-06-07-826455b7
          ports:
            - containerPort: 80
          resources:
            limits:
              memory: 100Mi
              cpu: "1"
            requests:
              memory: 50Mi
              cpu: "0.2"
