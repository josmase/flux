apiVersion: apps/v1
kind: Deployment
metadata:
  name: pterodactyl-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pterodactyl-postgres
  template:
    metadata:
      labels:
        app: pterodactyl-postgres
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pterodactyl-secrets
                  key: DB_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: pterodactyl-secrets
                  key: DB_DATABASE_NAME
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: pterodactyl-secrets
                  key: DB_USERNAME
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pterodactyl-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: postgres-data
              subPath: pgdata
              mountPath: /var/lib/postgresql/data
          ports:
            - containerPort: 5432
              name: postgres
          resources:
            requests:
              cpu: "0.2"
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: pterodactyl-db-pvc
