apiVersion: apps/v1
kind: Deployment
metadata:
  name: pterodactyl-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pterodactyl-mysql
  template:
    metadata:
      labels:
        app: pterodactyl-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.4@sha256:43bd9764df60666fb2ba2cf8217dd17b3d2414c150005d2fdd07a0cd73d3b7f5
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pterodactyl-secrets
                  key: DB_PASSWORD
            - name: MYSQL_DATABASE
              value: "panel"
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: pterodactyl-secrets
                  key: DB_USERNAME
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pterodactyl-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          ports:
            - containerPort: 3306
              name: mysql
          resources:
            requests:
              cpu: "0.2"
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: pterodactyl-db-pvc