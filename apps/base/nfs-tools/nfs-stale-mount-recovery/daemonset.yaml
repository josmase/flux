apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nfs-stale-mount-recovery
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: nfs-stale-mount-recovery
  template:
    metadata:
      labels:
        app: nfs-stale-mount-recovery
    spec:
      hostPID: true
      containers:
        - name: recovery-agent
          image: registry.gitlab.local.hejsan.xyz/josmase/infrastructure/nfs-stale-mount-recovery:latest
          securityContext:
            privileged: true
            capabilities:
              add: ["SYS_ADMIN"]
          volumeMounts:
            - name: host-root
              mountPath: /host
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
          env:
            - name: HOST_ROOT
              value: /host
            - name: CHECK_INTERVAL
              value: "30"
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: host-root
          hostPath:
            path: /
        - name: host-proc
          hostPath:
            path: /proc
      tolerations:
        - operator: Exists
