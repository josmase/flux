---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: blog
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  path: ./deploy/overlays/production
  prune: true
  wait: true
  timeout: 5m0s
  sourceRef:
    kind: GitRepository
    name: blog
  postBuild:
    substitute:
      DOMAIN_INTERNAL: "${DOMAIN_INTERNAL}"
      CERT_SECRET_INTERNAL: "${CERT_SECRET_INTERNAL}"
