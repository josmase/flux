apiVersion: v1
kind: ConfigMap
metadata:
  name: odysseus-config
data:
  # --- LLM / Model serving ---
  # Point at the PC running llama.cpp on the same LAN
  LLM_HOST: "http://192.168.1.7:8090/v1"
  EMBEDDING_URL: "http://192.168.1.7:8090/v1"

  # --- Database ---
  # DATABASE_URL is set via secretRef from db-provisioner output

  # --- Auth & Security ---
  AUTH_ENABLED: "true"
  LOCALHOST_BYPASS: "false"
  SECURE_COOKIES: "true"
  ALLOWED_ORIGINS: "https://odysseus.local.hejsan.xyz,http://localhost:7000"

  # --- ChromaDB (vector store) ---
  CHROMADB_HOST: "chromadb.odysseus.svc.cluster.local"
  CHROMADB_PORT: "8000"

  # --- SearXNG (web search) ---
  SEARXNG_INSTANCE: "http://searxng.odysseus.svc:8080"

  # --- Admin user ---
  ODYSSEUS_ADMIN_USER: "admin"

  # --- Upload limits ---
  ODYSSEUS_CHAT_UPLOAD_MAX_BYTES: "52428800"    # 50 MB
  ODYSSEUS_PERSONAL_UPLOAD_MAX_BYTES: "52428800"

  # --- Misc ---
  CLEANUP_INTERVAL_HOURS: "24"
  TZ: "Europe/Stockholm"
