apiVersion: v1
kind: Service
metadata:
  name: minecraft-server
  namespace: minecraft
spec:
  type: LoadBalancer
  selector:
    app: minecraft-server
  ports:
    - name: minecraft
      port: 25565
      targetPort: 25565
    - name: minecraft-rcon
      port: 25575
      targetPort: 25575
    - name: metrics
      port: 19565
      targetPort: 19565