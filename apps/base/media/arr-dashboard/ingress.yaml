apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: arr-dashboard
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`arr-dashboard.${DOMAIN_INTERNAL}`)
      kind: Rule
      services:
        - name: arr-dashboard
          port: http

  tls:
    secretName: ${CERT_SECRET_INTERNAL}
