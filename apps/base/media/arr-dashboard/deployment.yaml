apiVersion: apps/v1
kind: Deployment
metadata:
  name: arr-dashboard
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: arr-dashboard
  template:
    metadata:
      labels:
        app: arr-dashboard
    spec:
      containers:
        - name: arr-dashboard
          image: artifactory.local.hejsan.xyz/docker/khak1s/arr-dashboard:2.18.5@sha256:ed6c9cb871ae70b27520ae8cee1d262800653c03df5e723e006eb8e404a18059
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: default-app-config
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            limits:
              memory: 512Mi
              cpu: "0.5"
            requests:
              memory: 128Mi
              cpu: "0.1"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: arr-dashboard-config
