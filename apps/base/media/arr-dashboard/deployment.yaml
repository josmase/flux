---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arr-dashboard
  labels:
    app: arr-dashboard
spec:
  replicas: 1
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: arr-dashboard
  template:
    metadata:
      labels:
        app: arr-dashboard
    spec:
      containers:
        - name: arr-dashboard
          image: artifactory.local.hejsan.xyz/docker/external/kha-kis/arr-dashboard:2026-07-17-146dcc1f
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: default-app-config
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            limits:
              memory: 1Gi
              cpu: "0.5"
            requests:
              memory: 128Mi
              cpu: "0.1"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: arr-dashboard-config
