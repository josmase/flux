apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      # Select the GPU-enabled node
      nodeSelector:
        gpu: "true"

      # Use NVIDIA runtime for GPU support
      runtimeClassName: nvidia

      # Tolerate GPU node taint to allow scheduling on dedicated GPU node
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "gpu-only"
          effect: "NoSchedule"

      serviceAccountName: jellyfin-log-watcher

      terminationGracePeriodSeconds: 120
      containers:
        - name: jellyfin
          image: artifactory.local.hejsan.xyz/docker/linuxserver/jellyfin:10.11.9@sha256:155fb51c745d1a2c28c8b300612bc728a5dd06097bbc62b8b1c76d174eb20366
          ports:
            - containerPort: 8096
              name: http
          # Liveness probe: checks both the HTTP health endpoint (process
          # responsiveness) and the NFS healthcheck file (filesystem health).
          # Stale file handles on the NFS mount cause `ls .healthcheck` to
          # fail, triggering a restart via the liveness probe.
          # failureThreshold=5 * periodSeconds=10 = 50s before restart.
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  curl -sf http://localhost:8096/health >/dev/null 2>&1 \
                    && ls /mnt/storage/files/.healthcheck >/dev/null 2>&1
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
          # Startup probe: validates NFS media mount is available before
          # Jellyfin starts. If NFS is unreachable, Jellyfin has nothing to serve.
          # failureThreshold=30 * periodSeconds=10 = 300s (5min) max startup time.
          startupProbe:
            exec:
              command: ["sh", "-c", "ls /mnt/storage/files/.healthcheck"]
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          # Readiness probe: HTTP check - controls service entry.
          # failureThreshold=3 * periodSeconds=10 = 30s before removal.
          readinessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 2000m
              memory: 4Gi
              nvidia.com/gpu: 1
            limits:
              cpu: 8000m
              memory: 8Gi
              nvidia.com/gpu: 1
          env:
            # Enable hardware acceleration in Jellyfin
            - name: JELLYFIN_ENABLE_HARDWARE_ACCELERATION
              value: "true"
            # NVIDIA-specific environment variables
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,video,utility"
          envFrom:
            - configMapRef:
                name: default-app-config
          volumeMounts:
            - name: jellyfin-config-pvc
              mountPath: /config
            - name: jellyfin-transcode-pvc
              mountPath: /config/cache/transcodes
            - name: shared-storage
              mountPath: /mnt/storage/files
              readOnly: true
        # Sidecar: tails Jellyfin container logs and deletes the pod when
        # "Stale file handle" appears. This provides fast (sub-minute)
        # recovery when transient stale handles aren't persistent enough
        # to trigger the liveness probe's 50s threshold.
        - name: log-watcher
          image: bitnami/kubectl:latest
          command:
            - sh
            - -c
            - |
              kubectl logs "$POD_NAME" -c jellyfin -n "$NAMESPACE" --tail=0 --follow 2>/dev/null \
                | grep -q "Stale file handle" \
                && kubectl delete pod "$POD_NAME" -n "$NAMESPACE" --wait=false
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: jellyfin-config-pvc
          persistentVolumeClaim:
            claimName: jellyfin-config-pvc-jellyfin-0
        - name: jellyfin-transcode-pvc
          emptyDir: {}
        - name: shared-storage
          persistentVolumeClaim:
            claimName: jellyfin-media-nfs-pvc
