apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      # Select the GPU-enabled node
      nodeSelector:
        gpu: "true"

      # Use NVIDIA runtime for GPU support
      runtimeClassName: nvidia

      # Tolerate GPU node taint to allow scheduling on dedicated GPU node
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "gpu-only"
          effect: "NoSchedule"

      containers:
        - name: jellyfin
          image: artifactory.local.hejsan.xyz/docker/linuxserver/jellyfin:10.11.9@sha256:155fb51c745d1a2c28c8b300612bc728a5dd06097bbc62b8b1c76d174eb20366
          ports:
            - containerPort: 8096
              name: http
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  ls /mnt/storage/files/.healthcheck >/dev/null 2>&1 || exit 1
                  tail -100 /config/log/log_$(date +%Y%m%d).log 2>/dev/null | grep -q "Stale file handle" && exit 1 || true
                  curl -sf http://localhost:8096/health >/dev/null 2>&1 || exit 1
            initialDelaySeconds: 90
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 2
          startupProbe:
            exec:
              command: ["sh", "-c", "ls /mnt/storage/files/.healthcheck"]
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              cpu: 2000m
              memory: 4Gi
              nvidia.com/gpu: 1
            limits:
              cpu: 8000m
              memory: 8Gi
              nvidia.com/gpu: 1
          env:
            # Enable hardware acceleration in Jellyfin
            - name: JELLYFIN_ENABLE_HARDWARE_ACCELERATION
              value: "true"
            # NVIDIA-specific environment variables
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,video,utility"
          envFrom:
            - configMapRef:
                name: default-app-config
          volumeMounts:
            - name: jellyfin-config-pvc
              mountPath: /config
            - name: jellyfin-transcode-pvc
              mountPath: /config/cache/transcodes
            - name: shared-storage
              mountPath: /mnt/storage/files
              readOnly: true
      volumes:
        - name: jellyfin-config-pvc
          persistentVolumeClaim:
            claimName: jellyfin-config-pvc-jellyfin-0
        - name: jellyfin-transcode-pvc
          emptyDir: {}
        - name: shared-storage
          persistentVolumeClaim:
            claimName: jellyfin-media-nfs-pvc
