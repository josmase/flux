apiVersion: v1
kind: PersistentVolume
metadata:
  name: pvc-9175b25b-a542-4cac-bc9c-661e25ff4484
  labels:
    media-app: jellyfin
spec:
  capacity:
    storage: 80Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: longhorn-gpu
  csi:
    driver: driver.longhorn.io
    fsType: ext4
    volumeHandle: pvc-9175b25b-a542-4cac-bc9c-661e25ff4484
    volumeAttributes:
      numberOfReplicas: "3"
      staleReplicaTimeout: "20"
  volumeMode: Filesystem
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config-pvc-jellyfin-0
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-gpu
  selector:
    matchLabels:
      media-app: jellyfin
  resources:
    requests:
      storage: 80Gi
---
# In-tree NFS PV for Jellyfin media — kept for rollback; CSI-backed PV below
# handles production traffic with stale mount auto-recovery.
#
# Mount options tuned for read-only, metadata-heavy workloads with fast
# failover: soft mounts, aggressive timeouts, no directory caching.
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-media-nfs-pv
  labels:
    media-app: jellyfin
    purpose: media-readonly
spec:
  capacity:
    storage: 110Ti
  volumeMode: Filesystem
  storageClassName: "jellyfin-media"
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: storage.local.hejsan.xyz
    path: "/files"
  mountOptions:
    - ro
    - soft
    - bg
    - nfsvers=4.1
    - proto=tcp
    - timeo=30
    - retrans=3
    - actimeo=5
    - rsize=1048576
    - wsize=1048576
    - noatime
    - nodiratime
    - lookupcache=none
---
# CSI-backed NFS PV for Jellyfin media — uses csi-driver-nfs for built-in
# stale mount detection (os.Lstat → ESTALE) and auto-remount.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-media-nfs-csi-pv
  labels:
    media-app: jellyfin
    purpose: media-readonly
spec:
  capacity:
    storage: 110Ti
  volumeMode: Filesystem
  storageClassName: "jellyfin-media"
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: nfs.csi.k8s.io
    readOnly: true
    volumeHandle: jellyfin-media-nfs
    volumeAttributes:
      server: storage.local.hejsan.xyz
      share: /files
  mountOptions:
    - ro
    - soft
    - bg
    - nfsvers=4.1
    - proto=tcp
    - timeo=30
    - retrans=3
    - actimeo=5
    - rsize=1048576
    - wsize=1048576
    - noatime
    - nodiratime
    - lookupcache=none
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-media-nfs-pvc
  namespace: media
spec:
  storageClassName: "jellyfin-media"
  volumeName: jellyfin-media-nfs-csi-pv
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 110Ti
