---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: downloader
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  path: ./deploy/overlays/production
  prune: true
  wait: true
  timeout: 5m0s
  sourceRef:
    kind: GitRepository
    name: downloader
  postBuild:
    substitute:
      DOMAIN_EXTERNAL: "${DOMAIN_EXTERNAL}"
      CERT_SECRET_EXTERNAL: "${CERT_SECRET_EXTERNAL}"
