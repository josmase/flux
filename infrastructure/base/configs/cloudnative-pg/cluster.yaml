apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: shared-postgres
  namespace: cnpg-system
spec:
  # --- Topology ---
  instances: 3
  minSyncReplicas: 1
  maxSyncReplicas: 2

  # --- PostgreSQL image ---
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2

  # --- PostgreSQL configuration ---
  postgresql:
    pg_hba:
      - host all all all scram-sha-256
    parameters:
      archive_mode: "on"
      archive_timeout: 5min
      dynamic_shared_memory_type: posix
      full_page_writes: "on"
      log_destination: csvlog
      log_directory: /controller/log
      log_filename: postgres
      log_rotation_age: "0"
      log_rotation_size: "0"
      log_truncate_on_rotation: "false"
      logging_collector: "on"
      max_parallel_workers: "32"
      max_replication_slots: "32"
      max_worker_processes: "32"
      shared_memory_type: mmap
      shared_preload_libraries: ""
      ssl_max_protocol_version: TLSv1.3
      ssl_min_protocol_version: TLSv1.3
      wal_keep_size: 512MB
      wal_level: logical

  # --- Storage ---
  storage:
    size: 10Gi
    storageClass: longhorn

  walStorage:
    size: 5Gi
    storageClass: longhorn

  # --- Resources ---
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 2Gi
      cpu: 1

  # --- Monitoring ---
  monitoring:
    enablePodMonitor: true

  # --- Bootstrap ---
  bootstrap:
    initdb:
      database: postgres
      owner: postgres
      dataChecksums: true
      locale: en_US.UTF-8
      encoding: UTF-8

      # --- Post-init SQL ---
      postInitTemplateSQL:
        - |
          CREATE EXTENSION IF NOT EXISTS pgcrypto;
          CREATE EXTENSION IF NOT EXISTS pg_stat_statements;

  # --- Backup (volume snapshots via Longhorn) ---
  backup:
    volumeSnapshot:
      className: longhorn-snapshot
      snapshotOwnerReference: cluster
    retentionPolicy: "30d"

  # --- Managed roles (group roles for reuse) ---
  managed:
    roles:
      - name: db_reader
        comment: "Read-only access group role"
        login: false
      - name: db_writer
        comment: "Read-write access group role"
        login: false
      - name: db_owner
        comment: "Database owner group role"
        login: false
        createdb: true

  # --- High availability ---
  affinity:
    additionalPodAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - shared-postgres
            topologyKey: kubernetes.io/hostname

  # --- Node tolerations (if needed) ---
  # tolerations:
  #   - key: "storage"
  #     operator: "Exists"

  # --- Connection pooler (optional, uncomment when needed) ---
  # pgbouncer:
  #   poolMode: transaction
  #   instances: 2
  #   resources:
  #     requests:
  #       memory: 256Mi
  #       cpu: 100m
  #     limits:
  #       memory: 512Mi
  #       cpu: 500m
