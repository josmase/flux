apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: shared-postgres
  namespace: cnpg-system
spec:
  instances: 1
  storage:
    size: 5Gi
  walStorage:
    size: 2Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  scheduledBackup:
    - name: daily-backup
      schedule: "0 2 * * *"
      backupOwnerReference: self
      method: volumeSnapshot
      suspend: true  # disabled in dev
